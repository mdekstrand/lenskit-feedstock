context:
  name: lenskit
  version: "2026.2.1"
  python_min: '3.12'

recipe:
  name: lenskit
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 7751faa0fb4ebe5f9ae3e0f0d47d80800869b138757186e1ab4161ec3d58a263

build:
  number: 1

outputs:
  - package:
      name: lenskit

    build:
      python:
        version_independent: true
      script:
        - python -m pip install --no-deps --no-build-isolation -vv .

    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - python ${{ python_min }}.*
            - cross-python_${{ target_platform }}
            - crossenv
            - maturin >=1.3.2,<2
        - ${{ stdlib("c") }}
        - ${{ compiler("rust") }}
      host:
        - python ${{ python_min }}.*
        - pip
        - maturin >=1,<2
      run:
        - python >=${{ python_min }}
        - ${{ compiler("cxx") }}
        - typing-extensions ~=4.12
        - pyarrow >=20
        - pandas >=2.0,<4
        - numpy >=2.0,<3
        - scipy >=1.13,<2
        - pytorch >=2.4,<3
        - threadpoolctl >=3.0
        - structlog >=23.2
        - rich >=13.5
        - pyzmq >=26
        - click ~=8.1
        - requests ~=2.28
        - psutil >=6
        - py-cpuinfo >=9.0
        - pydantic ~=2.7
        - pydantic-settings ~=2.8
        - humanize ~=4.2
        - prettytable ~=3.14
        - xopen ~=2.0
        - lazy-loader >=0.4
        - setuptools >=80

    tests:
      - python:
          imports:
            - lenskit
            - lenskit.data
            - lenskit.als
            - lenskit.knn
          pip_check: false
      - script:
          - python -m lenskit --verbose doctor --full
      - script:
          - pytest -m "not slow" tests
        files:
          source:
            - tests/
            - conftest.py
            - data/
            - pipelines/
            - pyproject.toml
        requirements:
          run:
            - pytest >=8.2,<10
            - pytest-benchmark ~=5.1
            - pytest-doctestplus >=1.2.1,<2
            - hypothesis >=6.16
            - pyyaml ~=6.0

  - package:
      name: lenskit-sklearn
    build:
      noarch: python
      script:
        - "true"
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('lenskit') }}
        - scikit-learn >=1.5,<2
    tests:
      - python:
          imports:
            - lenskit.sklearn.svd
          pip_check: false
      - script:
          - pytest -m "not slow" tests/sklearn
        files:
          source:
            - tests/
            - conftest.py
            - data/
            - pyproject.toml
        requirements:
          run:
            - pytest >=8.2,<10
            - pytest-benchmark ~=5.1
            - pytest-doctestplus >=1.2.1,<2
            - hypothesis >=6.16
            - pyyaml ~=6.0

  - package:
      name: lenskit-implicit
    build:
      noarch: python
      script:
        - "true"
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('lenskit') }}
        - implicit >=0.7.2
    tests:
      - python:
          imports:
            - lenskit.implicit
          pip_check: false
      - script:
          - pytest -m "not slow" tests/implicit
        files:
          source:
            - tests/
            - conftest.py
            - data/
            - pyproject.toml
        requirements:
          run:
            - pytest >=8.2,<9
            - pytest-benchmark =4
            - pytest-doctestplus >=1.2.1,<2
            - hypothesis >=6.16
            - pyyaml ~=6.0

  - package:
      name: lenskit-hpf
    build:
      noarch: python
      skip:
        - win
      script:
        - "true"
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('lenskit') }}
        - hpfrec =0.2
    tests:
      - python:
          imports:
            - lenskit.hpf
          pip_check: false
      - script:
          - pytest -m "not slow" tests/hpf
        files:
          source:
            - tests/
            - conftest.py
            - data/
            - pyproject.toml
        requirements:
          run:
            - pytest >=8.2,<9
            - pytest-benchmark =4
            - pytest-doctestplus >=1.2.1,<2
            - hypothesis >=6.16
            - pyyaml ~=6.0

  - package:
      name: lenskit-tune
    build:
      noarch: python
      skip:
        - win
      script:
        - "true"
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('lenskit') }}
        - ray-tune >=2.42,<3
    tests:
      - script:
          - lenskit tune --help

about:
  license: MIT
  license_file: LICENSE.md
  summary: Recommender systems tools for Python
  description: |
    LensKit is an open-source toolkit for building, researching, and learning
    about recommender systems.

  homepage: https://lenskit.org
  repository: https://github.com/lenskit/lkpy
  documentation: https://lkpy.lenskit.org/

extra:
  recipe-maintainers:
    - mdekstrand
